---
name: CI

on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - "*"
  schedule:
    - cron: "15 6 * * 0"  # Once weekly, on Sundays

jobs:
  build:
    name: "Build a distribution tarball"
    runs-on: ubuntu-latest

    container:
      image: perldocker/perl-tester:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Perl version
        run: perl -V

      - name: DZil version
        run: dzil --version

      - name: Install CPM + Dist::Zilla Author Bundle
        uses: perl-actions/install-with-cpm@stable
        with:
          sudo: false
          install: Dist::Zilla::PluginBundle::Author::GTERMARS

      - name: Install dependencies
        run: cpm install -g --no-test --show-build-log-on-failure $(dzil listdeps --author --missing)

      - name: Test
        run: dzil test --all

      - name: Build tarball
        run: dzil build

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: tarball
          path: "*.gz"

      - name: Archive CPM logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: build.log
          path: ~/.perl-cpm/build.log*

  perl-versions:
    name: "Retrieve available perl-tester versions"
    runs-on: ubuntu-latest

    outputs:
      perl-versions: ${{ steps.action.outputs.perl-versions }}

    steps:
      - id: action
        uses: perl-actions/perl-versions@v2
        with:
          since-perl: "5.08"

  test:
    name: "Perl v${{ matrix.perl-version }}"
    needs:
      - build
      - perl-versions
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        perl-version: ${{ fromJson (needs.perl-versions.outputs.perl-versions) }}

    container:
      image: perldocker/perl-tester:${{ matrix.perl-version }}

    steps:
      - name: Download tarball artifact
        uses: actions/download-artifact@v4
        with:
          name: tarball

      - name: Unpack tarball
        run: tar -xz --strip-components 1 -f *.gz

      - name: Perl version
        run: perl -V

      - name: Install dependencies
        uses: perl-actions/install-with-cpanm@v1
        with:
          sudo: false
          args: "--installdeps ."

      - name: Build
        run: |
          perl Makefile.PL
          make

      - name: Test
        run: make test

      - name: Archive CPANM logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: build.log
          path: ~/.cpanm/work/*/build.log
